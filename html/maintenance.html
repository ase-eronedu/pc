.maintenance-body{min-height:100vh;min-width:0; margin:0;padding:0;display:flex;justify-content:center;align-items:center;background:#F1F5F9;}
.maintenance-card{width:100%;max-width:560px;margin:40px 16px;padding:40px 24px;border-radius:16px;background:#fff;box-shadow:0 8px 16px rgba(53,63,86,0.05);text-align:center;box-sizing:border-box;}

.maintenance-card .maintenance-desc br{display:block;}
.maintenance-card .info-box{margin-top:24px;padding:24px;border-radius:12px;background:#F3F7FF;text-align:left;box-sizing:border-box;}
.maintenance-card .info-row + .info-row{margin-top:10px;}
.maintenance-card .info-label{display:block;font-size:14px;font-weight:600;color:#64748B;margin-bottom:4px;}
.maintenance-card .info-value{display:block;font-size:16px;font-weight:500;color:#1E293B;}
.maintenance-card .info-value.highlight{color:#5436EA;background:none !important;}
.maintenance-card .footer-message{margin-top:20px;font-size:15px;font-weight:500;color:#475569;line-height:1.4;}
.maintenance-card .footer-message br{display:block;}
.maintenance-card .maintenance-logo{margin-top:24px;height:22px;display:flex;justify-content:center;align-items:center;font-size:18px;font-weight:800;color:#5436EA;}

@media (max-width: 768px) {
   .maintenance-card{width:335px; margin:40px 16px;padding:40px 24px;border-radius:16px;box-shadow:0 8px 16px rgba(53,63,86,0.05);}
   .maintenance-card .icon-wrap{width:69px;height:60px;margin:0 auto 20px;}
   .maintenance-card .maintenance-title{font-size:26px;}
   .maintenance-card .maintenance-desc{margin-top:10px;font-size:16px;white-space:nowrap;letter-spacing:-0.02em;}
   .maintenance-card .info-box{margin-top:24px;padding:24px;border-radius:12px;}
   .maintenance-card .info-row + .info-row{margin-top:10px;}
   .maintenance-card .info-label{font-size:14px;margin-bottom:4px;}
   .maintenance-card .info-value{font-size:16px;}
   .maintenance-card .info-value.highlight{background:none !important;}
   .maintenance-card .footer-message{margin-top:20px;font-size:15px;}
   .maintenance-card .maintenance-logo{margin-top:24px;height:22px;font-size:18px;}
}
</style>
